name: Generate Daily AI Article

on:
  # Run at 6:00 AM JST (21:00 UTC on previous day)
  # Schedule: Sunday, Monday, Tuesday, Wednesday, Friday, Saturday at 21:00 UTC
  # (Corresponds to Monday, Tuesday, Wednesday, Thursday, Saturday, Sunday mornings JST)
  schedule:
    - cron: '0 21 * * 0,1,2,3,5,6'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate and Push Article
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci
          npm install @napi-rs/canvas-linux-x64-gnu

      - name: Run daily article generation script
        run: node scripts/generate-daily-article.cjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/articles/ public/images/
          if ! git diff --cached --quiet; then
            git commit -m "auto: publish daily AI article"
            git push origin main
          else
            echo "No new article generated or changes detected."
          fi
