name: Generate Weekly AI News Summary

on:
  # Run at 7:00 AM JST on Friday (22:00 UTC on Thursday)
  schedule:
    - cron: '0 22 * * 4'
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate and Push Article
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run news generation script
        run: node scripts/generate-weekly-news.cjs
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/articles/
          if ! git diff --cached --quiet; then
            git commit -m "auto: publish weekly AI news summary"
            git push origin main
          else
            echo "No new article generated or changes detected."
          fi
